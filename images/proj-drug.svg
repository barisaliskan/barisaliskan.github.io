<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="'Space Grotesk','Segoe UI',Inter,sans-serif">
  <defs>
    <linearGradient id="drBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12100e"/>
      <stop offset="1" stop-color="#0c0b0a"/>
    </linearGradient>
    <radialGradient id="drGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ff5a1f" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff5a1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a1f" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ff5a1f" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="drEdge2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#ff5a1f" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ff884d" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="drHub" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#ff884d"/>
      <stop offset="1" stop-color="#ff5a1f"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="880" fill="url(#drBg)"/>
  <rect width="1280" height="880" fill="url(#drGlow)"/>

  <!-- header -->
  <text x="64" y="78" fill="#ff5a1f" font-size="20" letter-spacing="3" font-family="'JetBrains Mono',monospace">İLAÇ – BELİRTİ EŞLEŞTİRME</text>
  <text x="1216" y="78" text-anchor="end" fill="#8b8478" font-size="18" letter-spacing="2" font-family="'JetBrains Mono',monospace">RAG + LLM PIPELINE</text>
  <line x1="64" y1="104" x2="1216" y2="104" stroke="#f5efe4" stroke-opacity="0.12"/>

  <!-- column labels -->
  <text x="180" y="176" text-anchor="middle" fill="#cbc4b6" font-size="17" font-weight="600" letter-spacing="1">BELİRTİLER</text>
  <text x="1100" y="176" text-anchor="middle" fill="#cbc4b6" font-size="17" font-weight="600" letter-spacing="1">İLAÇLAR</text>

  <!-- edges -->
  <g fill="none" stroke-width="3">
    <path d="M312 258 C470 258 500 440 620 440" stroke="url(#drEdge)"/>
    <path d="M312 360 C470 360 520 440 620 440" stroke="url(#drEdge)"/>
    <path d="M312 462 L620 440" stroke="url(#drEdge)"/>
    <path d="M312 564 C470 564 520 440 620 440" stroke="url(#drEdge)"/>
    <path d="M312 666 C470 666 500 440 620 440" stroke="url(#drEdge)"/>
    <path d="M660 440 C780 440 820 300 968 300" stroke="url(#drEdge2)"/>
    <path d="M660 440 L968 440" stroke="url(#drEdge2)"/>
    <path d="M660 440 C780 440 820 580 968 580" stroke="url(#drEdge2)"/>
  </g>

  <!-- symptom nodes -->
  <g font-size="18" fill="#f5efe4" font-weight="500">
    <g><rect x="64" y="234" width="248" height="48" rx="24" fill="#1d1a16" stroke="#f5efe4" stroke-opacity="0.14"/><text x="188" y="264" text-anchor="middle">Baş ağrısı</text></g>
    <g><rect x="64" y="336" width="248" height="48" rx="24" fill="#1d1a16" stroke="#f5efe4" stroke-opacity="0.14"/><text x="188" y="366" text-anchor="middle">Bulantı</text></g>
    <g><rect x="64" y="438" width="248" height="48" rx="24" fill="#1d1a16" stroke="#f5efe4" stroke-opacity="0.14"/><text x="188" y="468" text-anchor="middle">Cilt döküntüsü</text></g>
    <g><rect x="64" y="540" width="248" height="48" rx="24" fill="#1d1a16" stroke="#f5efe4" stroke-opacity="0.14"/><text x="188" y="570" text-anchor="middle">Baş dönmesi</text></g>
    <g><rect x="64" y="642" width="248" height="48" rx="24" fill="#1d1a16" stroke="#f5efe4" stroke-opacity="0.14"/><text x="188" y="672" text-anchor="middle">Yorgunluk</text></g>
  </g>

  <!-- central hub -->
  <circle cx="640" cy="440" r="66" fill="url(#drHub)"/>
  <circle cx="640" cy="440" r="82" fill="none" stroke="#ff5a1f" stroke-opacity="0.35" stroke-dasharray="2 9"/>
  <!-- pill icon -->
  <g transform="rotate(-40 640 440)">
    <rect x="606" y="424" width="68" height="32" rx="16" fill="#0c0b0a"/>
    <rect x="640" y="424" width="34" height="32" rx="16" fill="#0c0b0a" fill-opacity="0.35"/>
    <rect x="606" y="424" width="68" height="32" rx="16" fill="none" stroke="#fff" stroke-opacity="0.5"/>
  </g>

  <!-- drug nodes with match % -->
  <g font-size="18" font-weight="600">
    <g>
      <rect x="968" y="272" width="248" height="56" rx="16" fill="#1d1a16" stroke="#ff5a1f" stroke-opacity="0.45"/>
      <text x="992" y="298" fill="#f5efe4">İbuprofen</text>
      <text x="992" y="319" fill="#8b8478" font-size="13" font-weight="400" font-family="'JetBrains Mono',monospace">eşleşme 0.96</text>
      <text x="1192" y="307" text-anchor="end" fill="#ff884d" font-size="17" font-family="'JetBrains Mono',monospace">✓</text>
    </g>
    <g>
      <rect x="968" y="412" width="248" height="56" rx="16" fill="#1d1a16" stroke="#ff5a1f" stroke-opacity="0.45"/>
      <text x="992" y="438" fill="#f5efe4">Metformin</text>
      <text x="992" y="459" fill="#8b8478" font-size="13" font-weight="400" font-family="'JetBrains Mono',monospace">eşleşme 0.93</text>
      <text x="1192" y="447" text-anchor="end" fill="#ff884d" font-size="17" font-family="'JetBrains Mono',monospace">✓</text>
    </g>
    <g>
      <rect x="968" y="552" width="248" height="56" rx="16" fill="#1d1a16" stroke="#ff5a1f" stroke-opacity="0.45"/>
      <text x="992" y="578" fill="#f5efe4">Atorvastatin</text>
      <text x="992" y="599" fill="#8b8478" font-size="13" font-weight="400" font-family="'JetBrains Mono',monospace">eşleşme 0.90</text>
      <text x="1192" y="587" text-anchor="end" fill="#ff884d" font-size="17" font-family="'JetBrains Mono',monospace">✓</text>
    </g>
  </g>

  <!-- footer: sources + stats -->
  <line x1="64" y1="748" x2="1216" y2="748" stroke="#f5efe4" stroke-opacity="0.1"/>
  <g font-family="'JetBrains Mono',monospace">
    <text x="64" y="800" fill="#8b8478" font-size="15">KAYNAKLAR</text>
    <g font-size="15" fill="#cbc4b6">
      <g><rect x="180" y="782" width="96" height="30" rx="15" fill="none" stroke="#f5efe4" stroke-opacity="0.16"/><text x="228" y="802" text-anchor="middle">openFDA</text></g>
      <g><rect x="288" y="782" width="84" height="30" rx="15" fill="none" stroke="#f5efe4" stroke-opacity="0.16"/><text x="330" y="802" text-anchor="middle">FAERS</text></g>
      <g><rect x="384" y="782" width="84" height="30" rx="15" fill="none" stroke="#f5efe4" stroke-opacity="0.16"/><text x="426" y="802" text-anchor="middle">SIDER</text></g>
      <g><rect x="480" y="782" width="104" height="30" rx="15" fill="none" stroke="#f5efe4" stroke-opacity="0.16"/><text x="532" y="802" text-anchor="middle">OnSIDES</text></g>
    </g>
    <text x="936" y="802" text-anchor="end" fill="#f5efe4" font-size="17" font-weight="700"><tspan fill="#ff884d">3.5M+</tspan> kayıt</text>
    <text x="1216" y="802" text-anchor="end" fill="#f5efe4" font-size="17" font-weight="700"><tspan fill="#ff884d">0.95</tspan> F1</text>
  </g>
</svg>
